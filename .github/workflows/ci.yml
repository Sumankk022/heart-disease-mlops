name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test-train:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (flake8)
        run: flake8 src tests data

      - name: Unit tests (pytest)
        run: pytest -q

      - name: Download data & train model
        run: |
          python data/download_data.py
          python -m src.train
        env:
          MLFLOW_ALLOW_FILE_STORE: "true"

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: |
            models/model.joblib
            models/metrics.json

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-test-train
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Train model for image
        run: |
          pip install -r requirements.txt
          python data/download_data.py
          python -m src.train
        env:
          MLFLOW_ALLOW_FILE_STORE: "true"

      - name: Build Docker image
        run: docker build -t heart-disease-api:ci .

      - name: Smoke-test container
        run: |
          docker run -d --name hd-api -p 8000:8000 heart-disease-api:ci
          sleep 8
          curl --fail http://localhost:8000/health
          curl --fail -X POST http://localhost:8000/predict \
            -H 'Content-Type: application/json' \
            -d '{"age":63,"sex":1,"cp":1,"trestbps":145,"chol":233,"fbs":1,"restecg":2,"thalach":150,"exang":0,"oldpeak":2.3,"slope":3,"ca":0,"thal":6}'
          docker rm -f hd-api
